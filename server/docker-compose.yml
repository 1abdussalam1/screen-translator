version: "3.9"

networks:
  translator-network:
    driver: bridge

volumes:
  db-data:
  ollama-data:

services:
  ollama:
    image: ollama/ollama:latest
    container_name: screen-translator-ollama
    networks:
      - translator-network
    volumes:
      - ollama-data:/root/.ollama
    # ports:
    #   - "11434:11434"
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: screen-translator-app
    networks:
      - translator-network
    depends_on:
      ollama:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
      - ./versions.json:/app/versions.json:ro
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-aya-expanse:8b}
      - DATABASE_URL=sqlite+aiosqlite:///./data/screen_translator.db
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-in-production}
      - ADMIN_SESSION_EXPIRE_HOURS=${ADMIN_SESSION_EXPIRE_HOURS:-24}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemma-3-1b-it:free}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://localhost:8000/api/v1/health',timeout=5); exit(0 if r.status_code==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
